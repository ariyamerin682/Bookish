<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookish - Book Reviews</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="logo">
                <i class="fas fa-book-open"></i> Bookish
            </div>
            <div class="search-bar" id="searchBarContainer">
                <input type="text" id="searchInput" placeholder="Search for books..." />
                <button id="searchBtn"><i class="fas fa-search"></i> Search</button>
            </div>
            <div class="user-actions">
                <span class="user-badge" id="userBadge"><i class="fas fa-user-circle"></i> Guest</span>
                <button class="btn btn-primary" id="authBtn"><i class="fas fa-sign-in-alt"></i> Sign in</button>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="search"><i class="fas fa-search"></i> Search</button>
            <button class="tab-btn" data-tab="favorites"><i class="fas fa-heart"></i> Favorites</button>
            <button class="tab-btn" data-tab="lists"><i class="fas fa-list-ul"></i> My Lists</button>
        </nav>

        <!-- Search Tab -->
        <div id="tabSearch" class="tab-content active">
            <div id="bookGrid" class="book-grid"></div>
        </div>

        <!-- Favorites Tab -->
        <div id="tabFavorites" class="tab-content" style="display:none;">
            <h2 class="tab-heading"><i class="fas fa-heart" style="color:#e11d48;"></i> My Favorites</h2>
            <div id="favoritesGrid" class="book-grid"></div>
        </div>

        <!-- Lists Tab -->
        <div id="tabLists" class="tab-content" style="display:none;">
            <div class="lists-layout">
                <div class="lists-sidebar">
                    <h3><i class="fas fa-list-ul"></i> My Lists</h3>
                    <div id="listsSidebar" class="sidebar-lists"></div>
                    <div class="inline-form" style="margin-top:0.8rem;">
                        <input type="text" id="newListName" placeholder="New list name" />
                        <button id="createListBtn"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
                <div class="lists-content">
                    <div id="listBooksGrid" class="book-grid"></div>
                    <div id="listEmptyState" class="empty-state">
                        <i class="fas fa-hand-pointer" style="font-size:2rem;color:#cbd5e1;"></i>
                        <p style="margin-top:0.5rem;">Select a list from the sidebar to see its books</p>
                    </div>
                </div>
            </div>
        </div>

        <hr />
        <footer style="text-align:center;color:#64748b;font-size:0.85rem;padding:1rem 0;">
            <i class="fas fa-book-open"></i> Bookish &middot; MongoDB &middot; Google Books API
        </footer>
    </div>

    <!-- Detail Popup (floating) -->
    <div id="detailPopup" class="detail-popup" style="display:none;">
        <div class="popup-inner">
            <button id="popupClose" class="popup-close"><i class="fas fa-times"></i></button>
            <div class="popup-scroll">
                <div class="detail-flex">
                    <div class="detail-cover">
                        <img id="detailCover" src="" alt="cover" />
                    </div>
                    <div class="detail-info">
                        <h2 id="detailTitle">Title</h2>
                        <div class="author" id="detailAuthor">Author</div>
                        <div class="detail-meta">
                            <span><i class="fas fa-star" style="color:#f59e0b;"></i> <span id="detailRating">0.0</span></span>
                            <span><i class="fas fa-user"></i> <span id="detailReviewsCount">0</span> reviews</span>
                        </div>
                        <div class="description" id="detailDesc">Description</div>
                        <div class="detail-actions">
                            <button class="btn-filled" id="detailFavBtn"><i class="fas fa-heart"></i> Favorite</button>
                            <button id="detailListBtn"><i class="fas fa-list"></i> Add to list</button>
                        </div>
                        <div style="margin-top:0.8rem;">
                            <span id="detailFavoriteStatus" style="font-size:0.9rem;color:#475569;"></span>
                        </div>
                    </div>
                </div>

                <!-- Reviews -->
                <div style="margin-top:1.5rem; padding-top:1.5rem; border-top:1px solid #e2e8f0;">
                    <div class="section-title" style="margin:0 0 1rem;">
                        <h3 style="font-size:1rem;"><i class="fas fa-comment"></i> Reviews</h3>
                        <span id="reviewCountBadge" class="badge">0</span>
                    </div>
                    <div id="reviewList" class="review-list"></div>
                    <div style="margin-top: 1rem;">
                        <div class="inline-form">
                            <input type="number" id="reviewRatingInput" placeholder="1-5" min="1" max="5" style="max-width:70px; min-width:70px;" />
                            <textarea id="reviewTextInput" placeholder="Write your review..." rows="2"></textarea>
                            <button id="submitReviewBtn">Submit</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add to List Modal -->
    <div id="listModal" class="modal-overlay" style="display:none;">
        <div class="modal-card list-modal-card">
            <h2><i class="fas fa-list-ul" style="color:#3b82f6;"></i> Add to List</h2>
            <div id="listModalBookTitle" class="list-modal-book-title"></div>
            <div id="listCheckboxes" class="list-checkboxes"></div>
            <div class="list-modal-create">
                <input type="text" id="listModalNewName" placeholder="Create new list..." />
                <button id="listModalCreateBtn"><i class="fas fa-plus"></i></button>
            </div>
            <button id="listModalCloseBtn" class="btn-cancel">Done</button>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h2 id="authModalTitle">Sign in</h2>
            <form id="authForm" onsubmit="return false;">
                <input type="text" id="authName" placeholder="Name" style="display:none;" />
                <input type="email" id="authEmail" placeholder="Email" required />
                <input type="password" id="authPassword" placeholder="Password" required />
                <div id="authError" class="auth-error"></div>
                <button type="submit" id="authSubmitBtn" class="btn-full">Sign in</button>
            </form>
            <div id="authToggleLink" class="auth-toggle">
                Don't have an account? <a href="#" id="switchToRegister">Register</a>
            </div>
            <button id="authCancelBtn" class="btn-cancel">Cancel</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
